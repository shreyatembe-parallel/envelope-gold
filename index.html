<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gullak · Gold Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playpen+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold-1: #FEE1AF;
    --gold-2: #F5BE62;
    --gold-3: #E9A53F;
    --cream:  #FBEFD6;
    --maroon-cta-text: #5a1418;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);

    /* shared envelope placement */
    --env-left: 47.5px;
    --env-top: 326px;
    --env-scale: 1.0487;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  /* ---------- Phone frame ---------- */
  .phone {
    position: relative;
    width: 375px; height: 812px;
    overflow: hidden;
    cursor: pointer; user-select: none;
    background: radial-gradient(115% 90% at 50% 42%, #41051B 0%, #340416 100%);
  }

  .sunburst {
    position: absolute; top: 42%; left: 50%;
    width: 820px; height: 820px; transform: translate(-50%, -50%);
    background: repeating-conic-gradient(from 0deg at 50% 50%,
      rgba(255,222,160,0.06) 0deg 2.6deg,
      rgba(255,222,160,0)    2.6deg 9deg);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 6%, #000 26%, transparent 62%);
            mask-image: radial-gradient(circle at 50% 50%, transparent 6%, #000 26%, transparent 62%);
    opacity: 0; pointer-events: none; transition: opacity .9s ease;
    animation: sunspin 90s linear infinite;   /* very slow rotation for delight */
  }
  @keyframes sunspin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
  /* subtle (~4%) during the open, brighter (~6%) once gold is revealed */
  .phone[data-phase="opening"]  .sunburst,
  .phone[data-phase="emerging"] .sunburst,
  .phone[data-phase="settled"]  .sunburst { opacity: 0.66; }
  .phone[data-phase="revealed"] .sunburst { opacity: 1; }
  .glow {
    position: absolute; top: 12%; left: 50%;
    width: 460px; height: 460px; transform: translateX(-50%);
    background: radial-gradient(circle, rgba(255,200,120,0.15) 0%, rgba(255,200,120,0) 62%);
    pointer-events: none;
  }

  /* ---------- Heading ---------- */
  .heading {
    position: absolute; top: 110px; left: 22px; right: 22px;
    text-align: center; color: var(--cream);
    font-size: 23px; font-weight: 600; line-height: 1.34; letter-spacing: -0.2px;
    z-index: 20;
    transition: opacity .55s ease, transform .55s var(--ease);
  }
  .heading .name { color: var(--gold-2); }
  .phone[data-phase="settled"]  .heading,
  .phone[data-phase="revealed"] .heading { opacity: 0; transform: translateY(-12px); }

  /* ---------- Stage ---------- */
  .stage { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

  /* The three envelope layers share identical placement so they read as one object */
  .env-layer {
    position: absolute;
    left: var(--env-left); top: var(--env-top);
    width: 267px; height: 157px;
    transform-origin: 50% 62%;
    transform: scale(var(--env-scale));
    transition: transform 1s var(--ease), opacity .9s ease;
  }
  .env-layer img { position: absolute; display: block; }

  .env-back  { z-index: 1; }
  .env-mid   { z-index: 3; }
  .env-front { z-index: 4; }
  .flap-layer { z-index: 5; perspective: 1200px; top: calc(var(--env-top) + 1px); }

  .env-back .back   { left: 0; top: 0; width: 267px; }
  .env-mid .middle  { left: 0; top: 0; width: 267px; }
  .env-front .pocket { left: -14.47px; top: 27.34px; width: 296px; }

  /* hinge rotates about the top edge */
  .flap-hinge {
    position: absolute; left: 0; top: 0; width: 267px; height: 113px;
    transform-origin: 50% 0%; transform-style: preserve-3d;
    transform: rotateX(0deg);
    transition: transform .9s var(--ease);
  }
  .flap-hinge img { position: absolute; backface-visibility: hidden; }
  .flap-front { left: -14.5px; top: -15px; width: 296px; }
  .flap-back  { left: 0;       top: 0;     width: 268px; transform: rotateX(180deg); }

  /* ---------- Postcard ---------- */
  .card {
    position: absolute; left: 50%; top: 324px; width: 238px;
    transform: translateX(-50%); transform-origin: 50% 50%; z-index: 2;
    filter: drop-shadow(0 14px 26px rgba(0,0,0,0.45));
    transition: top 1s var(--ease), width 1s var(--ease), transform 1s var(--ease);
    will-change: top, width;
    container-type: inline-size;        /* lets the text scale with the card (cqw units) */
  }
  .card .pc-base { width: 100%; display: block; border-radius: 8px; }

  /* Dynamic text drawn on the postcard. Sizes are in cqw so they scale with the card. */
  .pc-text {
    position: absolute;
    left: 8%; top: 10%; width: 55%; bottom: 15%;
    display: flex; flex-direction: column;
    font-family: 'Playpen Sans', system-ui, cursive;
    font-weight: 500;
    overflow: hidden;
  }
  .pc-ink {
    /* handwritten blue gradient ink */
    background: linear-gradient(180deg, #001E76 0%, #221B43 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .pc-to   { font-size: 3.9cqw; line-height: 1.3; margin-bottom: 7%; }
  .pc-from { font-size: 3.9cqw; line-height: 1.3; margin-top: auto; }

  /* message + generated ruled lines (one rule per wrapped line, any font size) */
  .pc-msg-wrap { position: relative; --fs: 4.4cqw; --lh: 6.4cqw; }
  .pc-msg-wrap.msg-lg { --fs: 5.4cqw; --lh: 7.9cqw; }   /* short  */
  .pc-msg-wrap.msg-md { --fs: 4.4cqw; --lh: 6.4cqw; }   /* medium */
  .pc-msg-wrap.msg-sm { --fs: 3.5cqw; --lh: 5.2cqw; }   /* long   */
  .pc-msg {
    position: relative; z-index: 1;
    font-size: var(--fs); line-height: var(--lh);
    white-space: pre-wrap; word-break: break-word;
  }
  .pc-lines {
    position: absolute; left: 0; right: 0; top: 0; height: 100%; z-index: 0;
    background: repeating-linear-gradient(to bottom,
      transparent 0, transparent calc(var(--lh) - 1px),
      rgba(40, 35, 70, 0.24) calc(var(--lh) - 1px), rgba(40, 35, 70, 0.24) var(--lh));
  }

  /* ===================== PHASES ===================== */

  /* flap opens, then sits behind the card */
  .phone[data-phase="opening"]  .flap-hinge,
  .phone[data-phase="emerging"] .flap-hinge,
  .phone[data-phase="settled"]  .flap-hinge,
  .phone[data-phase="revealed"] .flap-hinge { transform: rotateX(-170deg); }

  .phone[data-phase="opening"]  .flap-layer,
  .phone[data-phase="emerging"] .flap-layer,
  .phone[data-phase="settled"]  .flap-layer,
  .phone[data-phase="revealed"] .flap-layer { z-index: 1; }

  /* card slides up out of the pocket */
  .phone[data-phase="emerging"] .card { top: 224px; width: 256px; }
  .phone[data-phase="emerging"] .env-back,
  .phone[data-phase="emerging"] .env-mid,
  .phone[data-phase="emerging"] .env-front,
  .phone[data-phase="emerging"] .flap-layer {
    transform: scale(calc(var(--env-scale) * 0.97)) translateY(6px);
    opacity: 0.92;
  }

  /* SETTLED — postcard rests in the centre; envelope shrinks & fades away */
  .phone[data-phase="settled"]  .card,
  .phone[data-phase="revealed"] .card { z-index: 30; }
  .phone[data-phase="settled"] .card { top: 232px; width: 330px; transform: translateX(-50%); }

  .phone[data-phase="settled"] .env-back,
  .phone[data-phase="settled"] .env-mid,
  .phone[data-phase="settled"] .env-front,
  .phone[data-phase="settled"] .flap-layer,
  .phone[data-phase="revealed"] .env-back,
  .phone[data-phase="revealed"] .env-mid,
  .phone[data-phase="revealed"] .env-front,
  .phone[data-phase="revealed"] .flap-layer {
    transform: scale(calc(var(--env-scale) * 0.6)) translateY(40px);
    opacity: 0;
  }

  /* REVEALED — postcard shrinks a touch, lifts & tilts; coin settles on top */
  .phone[data-phase="revealed"] .card {
    top: 168px; width: 300px;
    transform: translateX(-50%) rotate(-5deg);
  }

  /* ---------- Gold coin ---------- */
  .coin {
    position: absolute; left: 50%; top: 380px; width: 118px; aspect-ratio: 1;
    transform: translateX(-50%) scale(0.7); transform-origin: 50% 50%;
    z-index: 5; opacity: 0;
    transition: top .9s var(--ease), width .9s var(--ease), transform .9s var(--ease), opacity .5s ease;
    will-change: top, transform;
    background: url(gold-coin.png) center / contain no-repeat;
    filter: drop-shadow(0 12px 22px rgba(0,0,0,0.45));
  }
  /* peeks out from behind the postcard — only AFTER the envelope has faded away */
  .phone[data-phase="settled"] .coin {
    opacity: 1; z-index: 5; top: 382px; width: 118px;
    transform: translateX(-50%) scale(1);
    transition-delay: 1s;
  }
  /* settles in front + grows; lags the postcard slightly for an offset feel */
  .phone[data-phase="revealed"] .coin {
    opacity: 1; z-index: 35; top: 292px; width: 150px;
    transform: translateX(-50%) scale(1);
    transition-delay: .14s;
  }

  /* ---------- Sparkles (looping in the revealed background) ---------- */
  .sparkles { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .sparkle {
    position: absolute; width: 14px; height: 14px;
    background: #FFD75E;
    clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
    filter: drop-shadow(0 0 4px rgba(255,215,94,0.7));
    opacity: 0; transform: scale(0);
  }
  .phone[data-phase="revealed"] .sparkle {
    animation: twinkle 2.4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50%      { opacity: 1; transform: scale(1) rotate(90deg); }
  }

  /* ---------- Swipe-up affordance (settled state) ---------- */
  .swipe {
    position: absolute; left: 50%; top: 540px; transform: translateX(-50%);
    z-index: 36; text-align: center; opacity: 0; pointer-events: none;
    transition: opacity .5s ease;
  }
  /* appears after the envelope has faded + coin has peeked */
  .phone[data-phase="settled"] .swipe { opacity: 1; pointer-events: auto; transition-delay: 1.1s; }
  .swipe-cue { position: relative; width: 56px; height: 72px; margin: 0 auto 14px; }
  .swipe-track {
    position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
    width: 56px; height: 104px; border-radius: 28px;
    background: linear-gradient(180deg, rgba(255,224,170,0.12), rgba(255,224,170,0.02));
  }
  .swipe-btn {
    position: absolute; left: 0; bottom: 0;
    width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 50% 34%, #FCD98A 0%, #FCC46A 52%, #F2A33E 100%);
    color: #5a1418;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.55);
    animation: nudge 1.5s ease-in-out infinite;
  }
  .swipe-btn svg { width: 24px; height: 24px; }
  .swipe-txt { color: var(--cream); font-size: 16px; font-weight: 500; line-height: 1.4; width: 260px; }
  @keyframes nudge {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }

  /* ---------- Footer / CTA ---------- */
  .footer { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 24px 30px; z-index: 35; }
  .headline {
    text-align: center; color: var(--cream); font-size: 22px; font-weight: 500; line-height: 1.4;
    margin-bottom: 18px; opacity: 0; transform: translateY(8px);
    transition: opacity .5s ease, transform .5s var(--ease);
  }
  .headline b { color: var(--gold-2); font-weight: 700; }
  .phone[data-phase="revealed"] .headline { opacity: 1; transform: translateY(0); }

  .cta {
    width: 327px; max-width: 100%; height: 56px; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 16px; cursor: pointer;
    font-family: inherit; font-size: 17px; font-weight: 600; color: var(--maroon-cta-text);
    background: #FFB05A;
    transition: opacity .5s ease, transform .35s var(--ease);
  }
  .cta:active { transform: scale(0.98); }
  .cta .lbl-next { display: none; }

  /* CTA shows only in idle ("Tap to open") and revealed ("Download…") */
  .phone[data-phase="opening"]  .cta,
  .phone[data-phase="emerging"] .cta,
  .phone[data-phase="settled"]  .cta { opacity: 0; transform: translateY(10px); pointer-events: none; }
  .phone[data-phase="revealed"] .cta .lbl-open { display: none; }
  .phone[data-phase="revealed"] .cta .lbl-next { display: inline; }

  /* ---------- Demo-only compose modal ---------- */
  .modal {
    position: absolute; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(26, 3, 11, 0.72); backdrop-filter: blur(4px);
    transition: opacity .35s ease;
  }
  .modal.hidden { opacity: 0; pointer-events: none; }
  .modal-card {
    width: 100%; max-width: 327px;
    background: var(--cream); border-radius: 22px; padding: 22px 20px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    font-family: 'Poppins', sans-serif;
  }
  .modal-card h2 { font-size: 18px; font-weight: 600; color: #3b0d12; margin-bottom: 2px; }
  .modal-card .sub { font-size: 13px; color: #8a6a52; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; font-weight: 600; color: #6b4a32; margin-bottom: 6px;
  }
  .field .count { font-weight: 500; color: #b08a6a; }
  .field input, .field textarea {
    width: 100%; border: 1.5px solid #e6d4bd; border-radius: 12px;
    padding: 11px 13px; font-family: inherit; font-size: 15px; color: #3b0d12;
    background: #fff; resize: none; outline: none;
    transition: border-color .15s ease;
  }
  .field input:focus, .field textarea:focus { border-color: var(--gold-3); }
  .field textarea { min-height: 84px; line-height: 1.4; }
  .modal .cta { width: 100%; margin-top: 6px; }
</style>
</head>
<body>
  <div class="phone" id="phone" data-phase="idle">
    <div class="sunburst"></div>
    <div class="glow"></div>

    <h1 class="heading"><span class="name">Tushti</span> sent you a thank-you with something special inside</h1>

    <div class="stage">
      <div class="env-layer env-back">
        <img class="back" src="Back.svg" alt="" />
      </div>

      <div class="card">
        <img class="pc-base" src="empty.png" alt="Postcard" />
        <div class="pc-text">
          <div class="pc-to pc-ink" id="pcTo"></div>
          <div class="pc-msg-wrap" id="pcMsgWrap">
            <div class="pc-lines"></div>
            <div class="pc-msg pc-ink" id="pcMsg"></div>
          </div>
          <div class="pc-from pc-ink" id="pcFrom"></div>
        </div>
      </div>

      <div class="env-layer env-mid">
        <img class="middle" src="Middle.svg" alt="" />
      </div>

      <div class="env-layer env-front">
        <img class="pocket" src="Bottom.svg" alt="" />
      </div>

      <div class="env-layer flap-layer">
        <div class="flap-hinge">
          <img class="flap-front" src="Top-Close.svg" alt="" />
          <img class="flap-back"  src="Top-Open.svg"  alt="" />
        </div>
      </div>

      <!-- Gold coin. PLACEHOLDER disc; drop in your asset via the .coin background. -->
      <div class="coin" id="coin"></div>
    </div>

    <div class="sparkles">
      <span class="sparkle" style="top: 388px; left: 86px;  width: 13px; animation-delay: .0s;"></span>
      <span class="sparkle" style="top: 434px; left: 246px; width: 14px; animation-delay: .9s;"></span>
      <span class="sparkle" style="top: 300px; left: 300px; width: 10px; animation-delay: 1.5s;"></span>
      <span class="sparkle" style="top: 470px; left: 60px;  width: 9px;  animation-delay: .5s;"></span>
    </div>

    <!-- swipe-up affordance, shown once the postcard settles -->
    <div class="swipe" id="swipe">
      <div class="swipe-cue">
        <div class="swipe-track"></div>
        <button class="swipe-btn" id="swipeBtn" aria-label="Swipe up to reveal">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 4.5 L19 12 H15.2 V16.6 H8.8 V12 H5 Z" fill="currentColor"/>
            <rect x="8.8" y="18.8" width="6.4" height="2.3" rx="1.15" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="swipe-txt">Swipe up to reveal something special</div>
    </div>

    <div class="footer">
      <div class="headline">A thank-you, and <b>gold worth ₹501</b> just for you.</div>
      <button class="cta" id="cta">
        <span class="lbl-open">Tap to open</span>
        <span class="lbl-next">Download Gullak &amp; Claim gold</span>
      </button>
    </div>

    <!-- DEMO ONLY: compose modal. Real app should call renderPostcard(data) directly. -->
    <div class="modal" id="modal">
      <div class="modal-card">
        <h2>Write your card</h2>
        <p class="sub">Fill it in, then preview the reveal.</p>

        <div class="field">
          <label for="inTo">To <span class="count" id="cntTo">0/24</span></label>
          <input id="inTo" type="text" maxlength="24" placeholder="Anjali didi" />
        </div>
        <div class="field">
          <label for="inMsg">Message <span class="count" id="cntMsg">0/150</span></label>
          <textarea id="inMsg" maxlength="150" placeholder="Write a thank-you note…"></textarea>
        </div>
        <div class="field">
          <label for="inFrom">From <span class="count" id="cntFrom">0/24</span></label>
          <input id="inFrom" type="text" maxlength="24" placeholder="Shobhit" />
        </div>

        <button class="cta" id="previewBtn">Preview animation</button>
      </div>
    </div>
  </div>

<script>
/* =====================================================================
   ANIMATION CORE  (reusable — dev team integrates with this)
   ---------------------------------------------------------------------
   renderPostcard({ to, message, from }) — paints the postcard text and
       auto-selects the message size tier by length.
   playReveal() — runs the tap-to-open sequence.
   Set the phone to data-phase="idle" and call playReveal() on tap.
   The compose modal below is DEMO ONLY; in the real flow the message
   data comes from the previous screens — just call renderPostcard(data).
   ===================================================================== */

  const phone = document.getElementById('phone');
  const pcTo = document.getElementById('pcTo');
  const pcMsg = document.getElementById('pcMsg');
  const pcFrom = document.getElementById('pcFrom');

  const LIMITS = { to: 24, message: 150, from: 24 };

  // Message length → size tier. Tune the breakpoints / CSS cqw values to taste.
  function messageTier(len) {
    if (len <= 60)  return 'msg-lg';   // short  → larger ink
    if (len <= 110) return 'msg-md';   // medium → default
    return 'msg-sm';                   // long (up to 150) → smaller
  }

  const pcMsgWrap = document.getElementById('pcMsgWrap');

  function renderPostcard({ to = '', message = '', from = '' } = {}) {
    pcTo.textContent   = to   ? `To ${to},` : '';
    pcMsg.textContent  = message || '';
    pcFrom.textContent = from ? `– ${from}` : '';
    pcMsgWrap.classList.remove('msg-lg', 'msg-md', 'msg-sm');
    pcMsgWrap.classList.add(messageTier((message || '').length));
  }

  let running = false;
  const setPhase = p => phone.setAttribute('data-phase', p);

  // tap-to-open → postcard settles in the centre (then user swipes up for gold)
  const OPEN_PAUSE = 500;   // small beat after the tap before the envelope opens
  function playReveal() {
    if (running || phone.getAttribute('data-phase') !== 'idle') return;
    running = true;
    setTimeout(() => setPhase('opening'),  OPEN_PAUSE);
    setTimeout(() => setPhase('emerging'), OPEN_PAUSE + 750);
    setTimeout(() => { setPhase('settled'); running = false; }, OPEN_PAUSE + 1650);
  }

  // swipe up → postcard shrinks/tilts, gold coin settles on top
  function revealGold() {
    if (phone.getAttribute('data-phase') !== 'settled') return;
    setPhase('revealed');
  }

/* =====================================================================
   DEMO HARNESS  (modal + replay) — safe to drop in production
   ===================================================================== */

  const modal = document.getElementById('modal');
  const inTo = document.getElementById('inTo');
  const inMsg = document.getElementById('inMsg');
  const inFrom = document.getElementById('inFrom');

  // live character counters
  const bind = (input, countEl, max) => {
    const upd = () => countEl.textContent = `${input.value.length}/${max}`;
    input.addEventListener('input', upd); upd();
  };
  bind(inTo, document.getElementById('cntTo'), LIMITS.to);
  bind(inMsg, document.getElementById('cntMsg'), LIMITS.message);
  bind(inFrom, document.getElementById('cntFrom'), LIMITS.from);

  function openModal() { modal.classList.remove('hidden'); }

  document.getElementById('previewBtn').addEventListener('click', () => {
    renderPostcard({
      to:      inTo.value.trim()   || inTo.placeholder,
      message: inMsg.value.trim()  || inMsg.placeholder,
      from:    inFrom.value.trim() || inFrom.placeholder,
    });
    modal.classList.add('hidden');
    setPhase('idle');
  });

  phone.addEventListener('click', (e) => {
    if (!modal.classList.contains('hidden')) return;      // ignore taps while composing
    const phase = phone.getAttribute('data-phase');
    if (phase === 'idle') playReveal();
    else if (phase === 'revealed' && e.target.closest('#cta')) openModal(); // edit & replay
  });

  // Gold is revealed by an actual SWIPE UP (touch, mouse-drag, or trackpad/wheel) — not a tap.
  const SWIPE = 40;
  let startY = null;
  phone.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
  phone.addEventListener('touchend', (e) => {
    if (startY == null) return;
    if (startY - e.changedTouches[0].clientY > SWIPE) revealGold();
    startY = null;
  });
  phone.addEventListener('mousedown', (e) => {
    if (phone.getAttribute('data-phase') === 'settled') startY = e.clientY;
  });
  window.addEventListener('mouseup', (e) => {
    if (startY == null) return;
    if (startY - e.clientY > SWIPE) revealGold();
    startY = null;
  });
  phone.addEventListener('wheel', (e) => { if (e.deltaY < -8) revealGold(); }, { passive: true });
</script>
</body>
</html>
